  '/api/groups/delivery-crew/user/{employee_id}':
    delete:
      tags:
        - User Management > Requires Management Permissions
      summary: Remove A User to Delivery Crew Group
      description: |-
        ### Delete User from Delivery Crew Group

        The endpoint sends an HTTP DELETE request to remove a user with a specific employee ID from the "delivery-crew" group.

        ## Request

        #### Request Parameters

        - `employee_id` (path parameter) : The ID of the employee to be removed from the managers group.
            

        ## Response

        The response returned has a status code of 200 and a content type of "application/json". Below is the JSON schema for the response:

        ``` json
        {
          "type": "object",
          "properties": {
            "response": {
              "type": "string"
            }
          }
        }

         ```
      security: []
      parameters:
        - name: AUTH
          in: header
          schema:
            type: string
          example: '{{manager_token}}'
        - name: format
          in: query
          schema:
            type: string
          example: json
        - name: employee_id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  '/api/groups/managers/user/{employee_id}':
    delete:
      tags:
        - User Management > Requires Management Permissions
      summary: Remove A User to Manager's Group
      description: |-
        ### Delete User from Managers Group

        This endpoint makes an HTTP DELETE request to remove a user from the managers group.

        ## Requesr

        #### Request Parameters

        - `employee_id` (path parameter) : The ID of the employee to be removed from the managers group.
            

        ## Response

        The response returned has a status code of 200 and a content type of "application/json". Below is the JSON schema for the response:

        ``` json
        {
          "type": "object",
          "properties": {
            "response": {
              "type": "string"
            }
          }
        }

