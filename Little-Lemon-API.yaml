tags:
  - name: User Management
    description: |-
      The endpoints along the `/api/users` route are dedicated the creation, authentication, and modification of API Consumer Accounts. With the exception of the [Create New User](https://www.postman.com/blackberry-py-dev/workspace/little-lemon-meta-apis-final-terry-brooks-jr/request/20135114-f11c33e2-c4f9-4a73-967e-876ee228af4e?action=share&source=copy-link&creator=20135114&ctx=documentation) request, allow other endpoints require a token be passed in the request headers.

      This set of endpoints have two sub collections for discoverability, and navigation:

      - [Token Managemement](https://www.postman.com/blackberry-py-dev/little-lemon-meta-apis-final-terry-brooks-jr/folder/4zautdl/token-management?action=share&source=copy-link&creator=20135114&ctx=documentation)
          
      - [Requires Manager Permissions](https://www.postman.com/blackberry-py-dev/little-lemon-meta-apis-final-terry-brooks-jr/folder/fump7n5/required-management-permissions?action=share&source=copy-link&creator=20135114&ctx=documentation)
  - name: User Management > Requires Management Permissions
    description: 'This sub-collection of request require that the token being passed has been assiged the role of `manager.` Please note for the purpose of this demo project, there is public token for use. API Consumers/Testers can either use the `manager_token` variable in places that call for the `user_token` variable, or Add the Manager Role to their own conumerr account via this [request](https://www.postman.com/blackberry-py-dev/little-lemon-meta-apis-final-terry-brooks-jr/request/3uou1hm/add-a-user-to-manager-s-group?action=share&source=copy-link&creator=20135114&ctx=documentation).'
  - name: User Management > Token Management
  - name: Order Management
    description: 'The /api/orders endpoints support the complete lifecycle of an order, covering actions from initial creation to updates and final deletion. This API provides comprehensive tools for managing all aspects of order processing.'
  - name: Inventory Management
    description: 'The `/api/menu-items` endpoints facilitate full inventory management, enabling operations such as adding new items, updating existing stock details, and removing items as needed. This API provides a robust set of tools to handle every stage of inventory control.'
  - name: Cart Management
    description: 'The `/api/cart` endpoints provide comprehensive cart management functionality, supporting actions from adding items to the cart, updating item quantities, and removing items as needed. This API enables a seamless shopping cart experience, allowing users to efficiently manage their selections before checkout.'
paths:
  /api/groups/delivery-crew/user:
    get:
      tags:
        - User Management > Requires Management Permissions
      summary: Get All Managers
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - User Management > Requires Management Permissions
      summary: Add A User to Delivery Crew Group
      description: |-
        The endpoint allows the addition of a user to the delivery crew group

        ### Request Body

        - username (string, required): The username of the user to be added to the delivery crew group.
            

        ### Response

        Upon successful execution, the response will have a status code of 201 and a content type of application/json. The response body will be empty.

        This endpoint allows the addition of a user to the delivery crew group.

        #### Request Body

        - username (string, required): The username of the user to be added to the delivery crew group.
            

        #### Response

        The response is a JSON object with the following schema:

        ``` json
        {
          "type": "object",
          "properties": {
            "response": {
              "type": "string"
              "description":"An Interpolated string confirming the username and that the permissions for the user have been modified to add those associated with the delivery crew role."
            }
          }
        }

         ```
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                username: terry-brooks
      parameters:
        - name: AUTH
          in: header
          schema:
            type: string
          example: '{{manager_token}}'
        - name: format
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/groups/managers/user:
    post:
      tags:
        - User Management > Requires Management Permissions
      summary: Add A User to Manager's Group
      description: |-
        ### POST /api/groups/managers/user

        This endpoint is used to add a user to the managers group.

        #### Request Body

        - username (string, required): The username of the user to be added to the managers group.
            

        Example:

        ``` json
        {
            "username": "barry_backend"
        }

         ```

        #### Response

        The response is in JSON format and has a status code of 201 (Created).

        #### JSON Schema

        ``` json
        {
            "type": "object",
            "properties": {
                "response": {
                    "type": "string",
                    "description": "Interpolated string providing confirmation of the role addition and the update to their perissions."
                }
            }
        }

         ```
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                username: '{{username}}'
      security: []
      parameters:
        - name: AUTH
          in: header
          schema:
            type: string
          example: '{{manager_token}}'
        - name: format
          in: query
          schema:
            type: string
          example: json
