  /api/menu-items/:
    post:
      tags:
        - Inventory Management
      summary: Create Menu Item
      description: |-
        ## Update Menu Item Details

        This API endpoint is used to update the details of a specific menu item.

        ### Request

        - Method: PATCH
            
        - URL: `{{base_url}}/api/menu-items/{{item_id}}?format=json`
            
        - Headers:
            
            - Content-Type: application/json
                
        - Body:
            
            - title (string, required): The updated title of the menu item.
                
            - price (float, required): The updated price of the menu item.
                
            - featured (boolean, required): Indicates if the menu item is featured.
                
            - category (Int, required): The updated category of the menu item.
                
                - Available Categories:
                    

        | Category ID | Name |
        | --- | --- |
        | 1 | entree |
        | 2 | beverage |
        | 3 | side-order |
        | 4 | dessert |

        ### Response

        The response for this request is a JSON object with the following schema:

        ``` json
        {
            "type": "object",
            "properties": {
                "count": {
                    "type": "integer"
                },
                "next": {
                    "type": "string"
                },
                "previous": {
                    "type": "string"
                },
                "results": {
                    "type": "array",
                    "items": {
                        "type": "object",
                        "properties": {
                            "item_id": {
                                "type": "integer"
                            },
                            "title": {
                                "type": "string"
                            },
                            "price": {
                                "type": "string"
                            },
                            "featured": {
                                "type": "boolean"
                            },
                            "category": {
                                "type": "string"
                            }
                        }
                    }
                }
            }
        }

         ```

        The response includes the count of items, pagination links, and an array of updated menu item details including the item_id, title, price, featured, and category.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                title: Halal Lamb Over Rice
                price: 8.95
                featured: true
                category: 1
      parameters:
        - name: format
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
